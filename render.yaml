services:
  - type: web
    name: bepul-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 16.15.1
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        sync: false
      - key: REACT_APP_SOCKET_URL
        sync: false
